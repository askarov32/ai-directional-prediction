project:
  name: MeshGraphNet Thermoelastic Commercial
  registry_dir: datasets
  outputs_dir: outputs

data:
  registry_dir: datasets
  processed_subdir: processed
  raw_subdir: raw
  k_nearest: 12
  target_mode: delta        # delta | absolute
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  min_std: 1.0e-8
  use_mesh_edges: true

model:
  type: conditional_meshgraphnet
  latent_dim: 128
  message_passing_steps: 10
  mlp_layers: 3
  dropout: 0.05
  layer_norm: true

training:
  device: auto              # auto | cuda | cpu
  use_amp: true
  epochs: 200
  lr: 0.0003
  weight_decay: 0.000001
  grad_clip: 1.0
  early_stopping_patience: 30
  seed: 42
  checkpoint_dir: outputs/checkpoints
  log_dir: outputs/logs
  resume_checkpoint: ''
  freeze_encoder_processor: false

loss_weights:
  temperature: 2.0
  displacement: 1.0
  velocity: 1.0
  stress: 1.5
  strain: 1.0
  other: 1.0

inference:
  device: auto
  checkpoint: outputs/checkpoints/best_model.pt
  dataset_id: sandstone_thermoelastic_demo
  rollout_steps: 100
  initial_state_source: from_dataset    # from_dataset | nearest_scenario | user_defined
  output_dir: outputs/predictions
  figures_dir: outputs/figures
  animation_dir: outputs/animations
  export_vtk: true
  animate: true
  risk_threshold: 0.8
  scenario:
    rock_type: sandstone
    physics_type: thermoelastic_wave
    source_type: heated_rod
    initial_temperature: 773.15
    background_temperature: 293.15
    source_center: [0.0, 0.0, 0.0]
    source_radius: 0.01
    dt: 0.0001
