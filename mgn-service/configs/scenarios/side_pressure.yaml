dataset_id: example_side_pressure
rock_type: granite
physics:
  type: thermoelastic_wave
  heat_transfer: false
  solid_mechanics: true
  thermal_expansion: false
geometry:
  mesh_file: side_pressure_mesh.mphtxt
  dimension: 3
  graph_source: mesh
scenario:
  type: side_pressure
  pressure_side: x_min
  pressure_value: 500000.0
  pressure_duration: 0.005
  loading_profile: ramp
  boundary_condition: fixed_opposite_side
material:
  source: data_materials.csv
  has_nodewise_materials: true
time:
  start: 0.0
  end: 0.01
  step: 0.0001
training:
  target_mode: delta
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
