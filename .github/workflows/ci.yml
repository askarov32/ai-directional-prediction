name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - pinn
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run backend tests
        run: python -m pytest

  pinn-tests:
    name: PINN contract tests
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPATH: pinn-service/src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pinn-service/requirements.txt

      - name: Install PINN dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r pinn-service/requirements.txt

      - name: Run PINN tests
        run: python -m pytest pinn-service/tests

  docker-compose-config:
    name: Docker Compose config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config --quiet
