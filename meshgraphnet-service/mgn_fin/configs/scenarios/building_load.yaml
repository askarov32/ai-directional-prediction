dataset_id: example_building_load
rock_type: limestone
physics:
  type: quasi_static_or_dynamic_mechanical_wave
  heat_transfer: false
  solid_mechanics: true
  thermal_expansion: false
geometry:
  mesh_file: building_load_mesh.mphtxt
  dimension: 3
  graph_source: mesh
scenario:
  type: building_load
  load_area_center: [0.5, 0.5, 1.0]
  load_area_size: [0.3, 0.3]
  load_value: 2000000.0
  load_type: static
  foundation_geometry: rectangular
  duration: 0.01
material:
  source: data_materials.csv
  has_nodewise_materials: true
time:
  start: 0.0
  end: 0.01
  step: 0.0001
training:
  target_mode: delta
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15
