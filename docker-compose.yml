services:
  backend:
    build:
      context: ./backend
    container_name: thermoelastic-backend
    environment:
      APP_NAME: ${APP_NAME:-Thermoelastic Direction API}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      MEDIA_CATALOG_PATH: /app/data/media/catalog.json
      REMOTE_MODEL_TIMEOUT_SECONDS: ${REMOTE_MODEL_TIMEOUT_SECONDS:-12}
      MODEL_MESHGRAPHNET_URL: ${MODEL_MESHGRAPHNET_URL:-http://mock-meshgraphnet:9000}
      MODEL_FNO_URL: ${MODEL_FNO_URL:-http://mock-fno:9000}
      MODEL_PINN_URL: ${MODEL_PINN_URL:-http://pinn-service:9000}
      MODEL_MESHGRAPHNET_PREDICT_PATH: ${MODEL_MESHGRAPHNET_PREDICT_PATH:-/predict}
      MODEL_FNO_PREDICT_PATH: ${MODEL_FNO_PREDICT_PATH:-/predict}
      MODEL_PINN_PREDICT_PATH: ${MODEL_PINN_PREDICT_PATH:-/predict}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      mock-meshgraphnet:
        condition: service_healthy
      mock-fno:
        condition: service_healthy
      pinn-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: thermoelastic-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

  mock-meshgraphnet:
    build:
      context: ./mock-services
    container_name: mock-meshgraphnet
    environment:
      SERVICE_KIND: meshgraphnet
    ports:
      - "${MOCK_MESHGRAPHNET_PORT:-9001}:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  mock-fno:
    build:
      context: ./mock-services
    container_name: mock-fno
    environment:
      SERVICE_KIND: fno
    ports:
      - "${MOCK_FNO_PORT:-9002}:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  pinn-service:
    build:
      context: ./pinn-service
    container_name: pinn-service
    environment:
      PINN_CHECKPOINT_PATH: ${PINN_CHECKPOINT_PATH:-/app/artifacts/checkpoints/baseline}
      PINN_DEVICE: ${PINN_DEVICE:-cpu}
      PINN_LOG_LEVEL: ${PINN_LOG_LEVEL:-INFO}
      PINN_SERVICE_PORT: 9000
      PINN_REFERENCE_TEMPERATURE_K: ${PINN_REFERENCE_TEMPERATURE_K:-293.15}
      PINN_TIME_SCALE: ${PINN_TIME_SCALE:-1.0}
    volumes:
      - ./pinn-service/artifacts:/app/artifacts
    ports:
      - "${PINN_SERVICE_PORT:-9003}:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
