services:
  backend:
    build:
      context: ./backend
    container_name: thermoelastic-backend
    environment:
      APP_NAME: ${APP_NAME:-Thermoelastic Direction API}
      APP_VERSION: ${APP_VERSION:-0.1.0}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      API_PREFIX: ${API_PREFIX:-/api/v1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      MEDIA_CATALOG_PATH: /app/data/media/catalog.json
      REMOTE_MODEL_TIMEOUT_SECONDS: ${REMOTE_MODEL_TIMEOUT_SECONDS:-60}
      MODEL_MESHGRAPHNET_URL: ${MODEL_MESHGRAPHNET_URL:-http://mgn-service:9000}
      MODEL_FNO_URL: ${MODEL_FNO_URL:-http://mock-fno:9000}
      MODEL_PINN_URL: ${MODEL_PINN_URL:-http://pinn-service:9000}
      MODEL_TRANSFORMER_URL: ${MODEL_TRANSFORMER_URL:-http://transformer-service:9000}
      MODEL_MESHGRAPHNET_PREDICT_PATH: ${MODEL_MESHGRAPHNET_PREDICT_PATH:-/predict}
      MODEL_FNO_PREDICT_PATH: ${MODEL_FNO_PREDICT_PATH:-/predict}
      MODEL_TRANSFORMER_PREDICT_PATH: ${MODEL_TRANSFORMER_PREDICT_PATH:-/predict}
      MODEL_PINN_PREDICT_PATH: ${MODEL_PINN_PREDICT_PATH:-/predict}
      MODEL_TRANSFORMER_PREDICT_PATH: ${MODEL_TRANSFORMER_PREDICT_PATH:-/predict}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      mgn-service:
        condition: service_healthy
      mock-fno:
        condition: service_healthy
      mock-transformer:
        condition: service_healthy
      pinn-service:
        condition: service_healthy
      transformer-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: thermoelastic-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy

  mgn-service:
    build:
      context: ./mgn-service
    container_name: mgn-service
    environment:
      MGN_DATASET_ID: ${MGN_DATASET_ID:-sandstone_comsol_real}
      MGN_CONFIG_PATH: ${MGN_CONFIG_PATH:-configs/inference.yaml}
      MGN_CHECKPOINT_PATH: ${MGN_CHECKPOINT_PATH:-outputs/checkpoints/best_model.pt}
      MGN_DEVICE: ${MGN_DEVICE:-cuda}
      MGN_PREDICT_TIMEOUT_SECONDS: ${MGN_PREDICT_TIMEOUT_SECONDS:-600}
      MGN_ROLLOUT_STEPS: ${MGN_ROLLOUT_STEPS:-5}
      MGN_ALLOW_FALLBACK: ${MGN_ALLOW_FALLBACK:-true}
    volumes:
      - ./mgn-service/datasets:/app/datasets
      - ./mgn-service/outputs:/app/outputs
    ports:
      - "${MGN_SERVICE_PORT:-9001}:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  mock-fno:
    build:
      context: ./mock-services
    container_name: mock-fno
    environment:
      SERVICE_KIND: fno
    ports:
      - "${MOCK_FNO_PORT:-9002}:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  mock-transformer:
    build:
      context: ./mock-services
    container_name: mock-transformer
    environment:
      SERVICE_KIND: transformer
    ports:
      - "${MOCK_TRANSFORMER_PORT:-9004}:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  pinn-service:
    build:
      context: ./pinn-service
    container_name: pinn-service
    environment:
      PINN_CHECKPOINT_PATH: ${PINN_CHECKPOINT_PATH:-/app/artifacts/checkpoints/baseline}
      PINN_DEVICE: ${PINN_DEVICE:-cuda}
      PINN_LOG_LEVEL: ${PINN_LOG_LEVEL:-INFO}
      PINN_SERVICE_PORT: 9000
      PINN_REFERENCE_TEMPERATURE_K: ${PINN_REFERENCE_TEMPERATURE_K:-293.15}
      PINN_TIME_SCALE: ${PINN_TIME_SCALE:-1.0}
    volumes:
      - ./pinn-service/artifacts:/app/artifacts
    ports:
      - "${PINN_SERVICE_PORT:-9003}:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  transformer-service:
    build:
      context: ./transformer-service
    container_name: transformer-service
    environment:
      TRANSFORMER_CHECKPOINT_PATH: ${TRANSFORMER_CHECKPOINT_PATH:-/app/artifacts/checkpoints/smoke}
      TRANSFORMER_DEVICE: ${TRANSFORMER_DEVICE:-cpu}
      TRANSFORMER_LOG_LEVEL: ${TRANSFORMER_LOG_LEVEL:-INFO}
      TRANSFORMER_SERVICE_PORT: 9000
      TRANSFORMER_REFERENCE_TEMPERATURE_K: ${TRANSFORMER_REFERENCE_TEMPERATURE_K:-293.15}
      TRANSFORMER_TIME_SCALE: ${TRANSFORMER_TIME_SCALE:-1.0}
      TRANSFORMER_ROLLOUT_STEPS: ${TRANSFORMER_ROLLOUT_STEPS:-10}
    volumes:
      - ./transformer-service/artifacts:/app/artifacts
    ports:
      - "${TRANSFORMER_SERVICE_PORT:-9004}:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/ready')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
