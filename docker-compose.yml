version: "3.9"

services:
  api:
    image: python:3.11-slim
    container_name: thermoelastic-api
    working_dir: /app
    command: sh -c "python -m http.server 8000"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./:/app
    environment:
      MESHGRAPHNET_URL: ${MESHGRAPHNET_URL}
      FNO_URL: ${FNO_URL}
      PINN_URL: ${PINN_URL}
    depends_on:
      - meshgraphnet
      - fno
      - pinn

  meshgraphnet:
    image: python:3.11-slim
    container_name: meshgraphnet-service
    command: sh -c "python -m http.server 8001"
    ports:
      - "8001:8001"

  fno:
    image: python:3.11-slim
    container_name: fno-service
    command: sh -c "python -m http.server 8002"
    ports:
      - "8002:8002"

  pinn:
    image: python:3.11-slim
    container_name: pinn-service
    command: sh -c "python -m http.server 8003"
    ports:
      - "8003:8003"
